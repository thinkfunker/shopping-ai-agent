<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping AI Agent Prototype</title>
    <!-- [FOUNDATION] Design System Variables -->
    <link rel="stylesheet" href="../design-system/design_system.css">
    <!-- [PROTOTYPE] Layout Styles -->
    <link rel="stylesheet" href="ShoppingAgentPrototype.css">

    <!-- [COMPONENTS] CSS mapping -->
    <link rel="stylesheet" href="../design-system/components/TopNavigation/TopNavigation.css">
    <link rel="stylesheet" href="../design-system/components/StatusBar/StatusBar.css">
    <link rel="stylesheet" href="../design-system/components/Message/Message.css">
    <link rel="stylesheet" href="../design-system/components/Message/MessageList.css">
    <link rel="stylesheet" href="../design-system/components/Carousel/Carousel.css">
    <link rel="stylesheet" href="../design-system/components/Carousel/AiSuggestionList.css">
    <link rel="stylesheet" href="../design-system/components/AITextInput/AITextInput.css">
    <link rel="stylesheet" href="../design-system/components/ImagePreview/ImagePreview.css">
    <link rel="stylesheet" href="../design-system/Templates/MediaCard/MediaCard.css">
    <link rel="stylesheet" href="../design-system/components/Score/Score.css">
    <link rel="stylesheet" href="../design-system/components/Tag/Tag.css">

    <style>
        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .ios-frame {
            border: 12px solid #222;
            border-radius: 54px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <div class="ios-frame">
        <div id="proto-app" class="proto-root"></div>
    </div>

    <!-- [COMPONENTS] Vanilla JS Library -->
    <script src="../design-system/components/Icon.js"></script>
    <script src="../design-system/components/StatusBar/StatusBar.js"></script>
    <script src="../design-system/components/TopNavigation/TopNavigation.js"></script>
    <script src="../design-system/components/Message/Message.js"></script>
    <script src="../design-system/components/Message/MessageList.js"></script>
    <script src="../design-system/Templates/MediaCard/MediaCard.js"></script>
    <script src="../design-system/components/Carousel/Carousel.js"></script>
    <script src="../design-system/components/Carousel/AiSuggestionList.js"></script>
    <script src="../design-system/components/AITextInput/AITextInput.js"></script>
    <script src="../design-system/components/Score/Score.js"></script>
    <script src="../design-system/components/Tag/Tag.js"></script>
    <script src="../design-system/components/ImagePreview/ImagePreview.js"></script>

    <script>
        const app = document.getElementById('proto-app');
        let chatHistory = [
            { role: 'AI', content: '안녕하세요! 당신의 쇼핑 어시스턴트입니다. 어떤 상품을 찾아드릴까요?', name: 'Shopping AI' }
        ];

        function renderPrototype() {
            app.innerHTML = '';

            // 1. Fixed Header
            const header = document.createElement('div');
            header.className = 'proto-header';
            header.appendChild(renderTopNavigation({
                headerTitle: '나의 쇼핑 AI',
                rightIcons: ['magnifying-glass-solid', 'cart-shopping-solid'],
                showAvatar: true
            }));
            app.appendChild(header);

            // 2. Dynamic Body
            const body = document.createElement('main');
            body.className = 'proto-body';

            const msgElements = chatHistory.map((m, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'proto-fade-in';

                const msgDom = renderMessage({
                    role: m.role,
                    content: m.content,
                    agentName: m.name
                });
                wrapper.appendChild(msgDom);

                if (m.hasResults) {
                    const products = [
                        { title: 'Air Jordan 1', subtitle: 'Iconic sneaker', rating: 4.8, count: 120, score: 98, img: 'https://images.unsplash.com/photo-1552346154-21d32810aba3?w=300' },
                        { title: 'Jordan 4', subtitle: 'Classic blue', rating: 5.0, count: 85, score: 92, img: 'https://images.unsplash.com/photo-1597043530272-bc882ff38289?w=300' }
                    ];

                    const cards = products.map(p => renderMediaCard({
                        title: p.title,
                        subtitle: p.subtitle,
                        rating: p.rating,
                        reviewCount: p.count,
                        score: p.score,
                        imageUrl: p.img,
                        onClick: () => showImageDetail(p)
                    }));

                    const carousel = renderCarousel({ items: cards, type: 'media' });
                    wrapper.appendChild(carousel);

                    const suggestions = renderAiSuggestionList({
                        title: 'AI의 다음 추천',
                        suggestions: ['다른 컬러?', '유사 상품 추천', '후기 보기'],
                        onSuggestionClick: (t) => simulateChat(t)
                    });
                    wrapper.appendChild(suggestions);
                }
                return wrapper;
            });

            const messageList = renderMessageList({ messages: msgElements });
            body.appendChild(messageList);
            app.appendChild(body);

            // 3. Fixed Footer Input
            const footer = document.createElement('footer');
            footer.className = 'proto-footer';
            footer.appendChild(renderAITextInput({
                placeholder: '메시지를 입력하세요...',
                onSend: (val) => simulateChat(val)
            }));
            app.appendChild(footer);

            // Scroll to bottom
            setTimeout(() => { body.scrollTop = body.scrollHeight; }, 100);
        }

        function simulateChat(val) {
            if (!val) return;
            chatHistory.push({ role: 'user', content: val });
            renderPrototype();

            // Thinking state simulation
            const thinkingMsg = renderMessage({ role: 'AI', state: 'loading', content: '취향을 분석하는 중입니다...' });
            thinkingMsg.className += ' proto-fade-in';
            const list = app.querySelector('.message-list');
            const item = document.createElement('div');
            item.className = 'message-list-item';
            item.appendChild(thinkingMsg);
            list.appendChild(item);
            app.querySelector('.proto-body').scrollTop = 100000;

            setTimeout(() => {
                chatHistory.push({
                    role: 'AI',
                    content: '고객님의 취향에 딱 맞는 조던 모델들을 선별했습니다.',
                    name: 'Shopping AI',
                    hasResults: true
                });
                renderPrototype();
            }, 1800);
        }

        function showImageDetail(p) {
            const preview = renderImagePreview({
                isOpen: true,
                imageSrc: p.img,
                title: p.title,
                score: p.rating,
                reviewCount: p.count,
                serviceName: 'Nike Official Store',
                tags: ['AI Pick', 'Trending'],
                onClose: () => {
                    const overlay = document.querySelector('.image-preview-overlay');
                    if (overlay) overlay.remove();
                }
            });
            document.body.appendChild(preview);
        }

        renderPrototype();
    </script>
</body>

</html>
