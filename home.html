<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping AI Agent - Home</title>
    <!-- Design System Foundation -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Noto+Sans+JP:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./design-system/design_system.css">
    <link rel="stylesheet" href="styles.css">

    <!-- Component Specific CSS -->
    <link rel="stylesheet" href="./design-system/components/TopNavigation/TopNavigation.css">
    <link rel="stylesheet" href="./design-system/components/AITextInput/AITextInput.css">
    <link rel="stylesheet" href="./design-system/components/Icon.css">
    <link rel="stylesheet" href="./design-system/components/Avatar/Avatar.css">
    <link rel="stylesheet" href="./design-system/components/Chip/Chip.css">

    <style>
        .hero-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px;
            text-align: center;
            gap: 16px;
        }

        .hero-greeting {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.3;
            color: var(--content-primary);
            white-space: pre-wrap;
            font-family: 'Noto Sans JP', sans-serif;
        }

        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
            padding: 0 16px;
            box-sizing: border-box;
            margin-top: 16px;
        }

        .pagination-dots {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: 12px;
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #D1D1D6;
        }

        .dot.active {
            background: #A83DEB;
        }

        .suggestion-cards-container {
            display: flex;
            gap: 8px;
            padding: 16px;
            margin-top: auto;
            width: 100%;
            box-sizing: border-box;
        }

        .footer-disclaimer {
            padding: 0 16px 16px;
            font-size: 12px;
            color: var(--content-tertiary);
            line-height: 1.5;
        }

        .footer-disclaimer a {
            color: #0f62fe;
            text-decoration: none;
        }

        .home-indicator {
            width: 134px;
            height: 5px;
            background: #000;
            border-radius: 100px;
            margin: 8px auto;
        }
    </style>
</head>

<body>
    <div class="shopping-agent-container">
        <!-- Header Section -->
        <header id="header-root" class="header-fixed"></header>

        <!-- Hero Content Section -->
        <main class="chat-viewport" style="display: flex; flex-direction: column;">
            <div class="hero-container">
                <div id="hero-logo"></div>
                <div class="hero-greeting">こんにちは、<br>お手伝いできる事はありますか</div>
            </div>

            <!-- Input in the middle (per Figma design) -->
            <div style="padding: 0 16px 16px;">
                <div id="hero-input"></div>
            </div>

            <!-- Category Grid -->
            <div class="category-grid" id="category-grid"></div>

            <!-- Pagination dots -->
            <div class="pagination-dots">
                <div class="dot active"></div>
                <div class="dot"></div>
            </div>

            <!-- Bottom Suggestion Cards -->
            <div class="suggestion-cards-container" id="suggestion-cards"></div>

            <div class="footer-disclaimer">
                AI의 답변은 부정확할 수 있습니다. AI가 생성한 답변의 주의점은 <a href="#">가이드라인</a>을 확인해주세요.
            </div>

            <div class="home-indicator"></div>
        </main>
    </div>

    <!-- Base Components -->
    <script src="./design-system/components/Icon.js"></script>
    <script src="./design-system/components/Avatar/Avatar.js"></script>

    <!-- Functional Components -->
    <script src="./design-system/components/TopNavigation/TopNavigation.js"></script>
    <script src="./design-system/components/AITextInput/AITextInput.js"></script>
    <script src="./design-system/components/Chip/Chip.js"></script>

    <script>
        function initHome() {
            // 1. Header
            const headerRoot = document.getElementById('header-root');
            headerRoot.appendChild(renderTopNavigation({
                os: 'mobile',
                titleAlign: 'left',
                headerTitle: 'Agent i',
                showLeftIcon: false,
                showDivider: false,
                rightIcons: ['bell-outline', 'bars-outline']
            }));

            // 2. Hero Logo
            const heroLogo = document.getElementById('hero-logo');
            heroLogo.appendChild(renderAvatar({ size: 'xxlarge', type: 'AI' }));

            // 3. Hero Input
            const heroInput = document.getElementById('hero-input');
            heroInput.appendChild(renderAITextInput({
                placeholder: 'なんでも聞いてください',
                type: 'simple',
                showLeftIcon: true
            }));

            // 4. Category Grid
            const grid = document.getElementById('category-grid');
            const categories = [
                { label: '天気', icon: 'cloud' },
                { label: 'レシピ', icon: 'plus' }, // Using fallback icons for now
                { label: 'お買い物', icon: 'cart' },
                { label: 'おでかけ', icon: 'map-pin' },
                { label: '旅行', icon: 'briefcase' },
                { label: '人間関係', icon: 'heart' }
            ];

            categories.forEach(cat => {
                grid.appendChild(renderChip({
                    label: cat.label,
                    variant: 'hero-category',
                    leftIcon: cat.icon
                }));
            });

            // 5. Suggestion Cards
            const sugContainer = document.getElementById('suggestion-cards');
            const suggestions = [
                'スター・ウォーズを簡単に解説して',
                '大谷翔平に関する最新トピックス'
            ];

            suggestions.forEach(sug => {
                sugContainer.appendChild(renderChip({
                    label: sug,
                    variant: 'suggestion-card',
                    className: 'suggestion-card'
                }));
            });
        }

        document.addEventListener('DOMContentLoaded', initHome);
    </script>
</body>

</html>
