    <!-- Explorer Specific Styles -->
    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 72px;
            --explorer-bg: #f5f5f7;
            --border-color: rgba(0, 0, 0, 0.08);
            --accent-color: #0f62fe;
            --sidebar-bg: #ffffff;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: var(--font-family-primary, 'Inter', sans-serif);
            overflow: hidden;
        }

        .explorer-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #a83deb 0%, #3083fd 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .menu-section {
            margin-bottom: 20px;
        }

        .menu-title {
            padding: 0 16px 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--content-tertiary);
            font-weight: 700;
        }

        .menu-item {
            padding: 10px 16px;
            margin: 2px 0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--content-secondary);
            border-radius: 8px;
            display: flex;
            align-items: center;
        }

        .menu-item:hover {
            background: rgba(0, 0, 0, 0.04);
            color: var(--content-primary);
        }

        .menu-item.active {
            color: var(--accent-color);
            background: rgba(15, 98, 254, 0.08);
            font-weight: 700;
        }


        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--explorer-bg);
            overflow: hidden;
        }

        .top-bar {
            height: var(--header-height);
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 24px;
            justify-content: space-between;
        }

        .preview-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Sandbox Container */
        .sandbox {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 48px;
            min-width: 320px;
            max-width: 800px;
            position: relative;
            transition: background 0.3s;
        }

        .sandbox.dark-mode {
            background: #17181a;
        }

        .controls-panel {
            height: 300px;
            background: #fff;
            border-top: 1px solid var(--border-color);
            display: flex;
        }

        .controls-inner {
            flex: 1;
            padding: 24px;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .code-inner {
            flex: 1;
            padding: 24px;
            background: #fafafa;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <div class="explorer-container">
        <!-- Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Agent i Explorer</h1>
            </div>
            <nav class="sidebar-menu" id="sidebar-menu">
                <!-- Dynamically generated menu -->
            </nav>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <header class="top-bar">
                <div id="active-item-title">Welcome</div>
                <div class="mode-toggles">
                    <button onclick="toggleDarkMode()">Light/Dark</button>
                </div>
            </header>

            <div class="preview-area">
                <div id="preview-canvas" class="sandbox">
                    <!-- Component render here -->
                    <div style="text-align: center; color: #adb5bd;">
                        Select a component from the sidebar to begin.
                    </div>
                </div>
            </div>

            <section class="controls-panel">
                <div class="controls-inner">
                    <h3>Controls</h3>
                    <div id="controls-list"></div>
                </div>
                <div class="code-inner">
                    <h3>Code Snippet</h3>
                    <pre id="code-snippet" style="font-size: 12px; color: #555;"></pre>
                </div>
            </section>
        </main>
    </div>

    <!-- Explorer Logic -->
    <script>
        // --- Data & Configuration ---
        const menuData = [
            {
                section: 'Foundations',
                items: [
                    { id: 'colors', name: 'Colors' },
                    { id: 'typography', name: 'Typography' }
                ]
            },
            {
                section: 'Icons',
                items: [
                    { id: 'icon-explorer', name: 'Icon Explorer' },
                    { id: 'spacing-radius', name: 'Spacing & Radius' }
                ]
            },
            {
                section: 'Components',
                items: [
                    { id: 'chip', name: 'Chip' },
                    { id: 'avatar', name: 'Avatar' },
                    { id: 'button', name: 'Button' },
                    { id: 'badge', name: 'Badge' },
                    { id: 'accordion', name: 'Accordion' },
                    { id: 'checkbox', name: 'Checkbox' },
                    { id: 'radio', name: 'Radio Button' },
                    { id: 'switch', name: 'Switch' },
                    { id: 'text-input', name: 'Text Input' },
                    { id: 'tag', name: 'Tag' },
                    { id: 'ghost-button', name: 'Ghost Button' },
                    { id: 'divider', name: 'Divider' },
                    { id: 'modal', name: 'Modal' },
                    { id: 'tabs', name: 'Tabs' },
                    { id: 'list-item', name: 'List Item' },
                    { id: 'carousel', name: 'Carousel' },
                    { id: 'tooltip', name: 'Tooltip' },
                    { id: 'toast', name: 'Toast' },
                    { id: 'thumbnail', name: 'Thumbnail' },
                    { id: 'progress', name: 'Progress Indicator' },
                    { id: 'top-nav', name: 'Top Navigation' },
                    { id: 'ai-input', name: 'AI Text Input' },
                    { id: 'ai-bg', name: 'AI Background' },
                    { id: 'card-expand', name: 'Card Expand' },
                    { id: 'footer', name: 'Footer' },
                    { id: 'pagination', name: 'Pagination' },
                    { id: 'score', name: 'Score' },
                    { id: 'scrim', name: 'Scrim' },
                    { id: 'toggle-btn', name: 'Toggle Button' },
                    { id: 'page-indicator', name: 'Page Indicator' },
                    { id: 'image-preview', name: 'Image Preview' },
                    { id: 'menu', name: 'Menu' },
                    { id: 'message', name: 'Message' },
                    { id: 'ai-suggestion', name: 'AI Suggestion List' }
                ]
            }
        ];

        // --- App State ---
        let currentItem = null;

        function initExplorer() {
            const menuContainer = document.getElementById('sidebar-menu');
            menuData.forEach(section => {
                const sectionEl = document.createElement('div');
                sectionEl.className = 'menu-section';
                sectionEl.innerHTML = `<div class="menu-title">${section.section}</div>`;

                section.items.forEach(item => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'menu-item';
                    itemEl.textContent = item.name;
                    itemEl.onclick = (e) => loadItem(item, e.currentTarget);
                    sectionEl.appendChild(itemEl);
                });
                menuContainer.appendChild(sectionEl);
            });

            // Load default item
            const firstItem = document.querySelector('.menu-item');
            if (firstItem) firstItem.click();
        }

        function loadItem(item, targetEl) {
            currentItem = item;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            targetEl.classList.add('active');
            document.getElementById('active-item-title').textContent = item.name;

            const canvas = document.getElementById('preview-canvas');
            const controls = document.getElementById('controls-list');
            canvas.innerHTML = '';
            controls.innerHTML = '';
            document.getElementById('code-snippet').textContent = '';

            switch (item.id) {
                case 'colors': renderColors(canvas); break;
                case 'typography': renderTypography(canvas); break;
                case 'icon-explorer': renderIconExplorer(canvas); break;
                case 'spacing-radius': renderSpacingRadius(canvas); break;
                case 'chip': setupChipStory(canvas, controls); break;
                case 'avatar': setupAvatarStory(canvas, controls); break;
                case 'button': setupButtonStory(canvas, controls); break;
                case 'badge': setupBadgeStory(canvas, controls); break;
                case 'accordion': setupAccordionStory(canvas, controls); break;
                case 'checkbox': setupCheckboxStory(canvas, controls); break;
                case 'radio': setupRadioButtonStory(canvas, controls); break;
                case 'switch': setupSwitchStory(canvas, controls); break;
                case 'text-input': setupTextInputStory(canvas, controls); break;
                case 'tag': setupTagStory(canvas, controls); break;
                case 'ghost-button': setupGhostButtonStory(canvas, controls); break;
                case 'divider': setupDividerStory(canvas, controls); break;
                case 'modal': setupModalStory(canvas, controls); break;
                case 'tabs': setupTabsStory(canvas, controls); break;
                case 'list-item': setupListItemStory(canvas, controls); break;
                case 'carousel': setupCarouselStory(canvas, controls); break;
                case 'tooltip': setupTooltipStory(canvas, controls); break;
                case 'toast': setupToastStory(canvas, controls); break;
                case 'thumbnail': setupThumbnailStory(canvas, controls); break;
                case 'progress': setupProgressStory(canvas, controls); break;
                case 'top-nav': setupTopNavStory(canvas, controls); break;
                case 'ai-input': setupAIInputStory(canvas, controls); break;
                case 'ai-bg': setupAIBgStory(canvas, controls); break;
                case 'card-expand': setupCardExpandStory(canvas, controls); break;
                case 'footer': setupFooterStory(canvas, controls); break;
                case 'pagination': setupPaginationStory(canvas, controls); break;
                case 'score': setupScoreStory(canvas, controls); break;
                case 'scrim': setupScrimStory(canvas, controls); break;
                case 'toggle-btn': setupToggleBtnStory(canvas, controls); break;
                case 'page-indicator': setupPageIndicatorStory(canvas, controls); break;
                case 'image-preview': setupImagePreviewStory(canvas, controls); break;
                case 'menu': setupMenuStory(canvas, controls); break;
                case 'message': setupMessageStory(canvas, controls); break;
                case 'ai-suggestion': setupAISuggestionStory(canvas, controls); break;
            }
        }

        function setCanvasContent(canvas, content) {
            if (typeof content === 'string') {
                canvas.innerHTML = content;
            } else if (content instanceof HTMLElement) {
                canvas.appendChild(content);
            }
        }

        // --- Foundations ---
        function renderColors(container) {
            const colorGroups = {
                'Brand & Key': ['--bg-key', '--content-key', '--border-key', '--blue-8'],
                'Grays': ['--gray-1', '--gray-3', '--gray-5', '--gray-7', '--gray-9', '--gray-11', '--gray-14'],
                'Content': ['--content-primary', '--content-secondary', '--content-tertiary', '--content-disabled'],
                'Background': ['--bg-primary', '--bg-secondary', '--bg-tertiary', '--bg-surface'],
                'Border': ['--border-primary', '--border-secondary', '--border-tertiary'],
                'System': ['--bg-success', '--bg-alert', '--bg-warning']
            };

            let html = '<div style="width: 100%; display: grid; gap: 32px;">';
            for (const [groupName, vars] of Object.entries(colorGroups)) {
                html += `<div><h4 style="margin-bottom:12px">${groupName}</h4><div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:16px;">`;
                vars.forEach(v => {
                    html += `
                        <div style="display:flex; flex-direction:column; gap:8px;">
                            <div style="height:60px; border-radius:8px; border:1px solid #eee; background:var(${v})"></div>
                            <div style="font-size:11px; font-weight:600">${v}</div>
                        </div>
                    `;
                });
                html += '</div></div>';
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function renderTypography(container) {
            const samples = [
                { label: 'Title XXLarge', class: 'title-bold-xxlarge', text: 'Agent i Design System' },
                { label: 'Title XLarge', class: 'title-bold-xlarge', text: 'Components & Guidelines' },
                { label: 'Title Large', class: 'title-bold-large', text: 'Interactive Explorer' },
                { label: 'Body Medium', class: 'body-medium', text: 'This is the standard body text used across the agent interface.' },
                { label: 'Label Bold Small', class: 'label-bold-small', text: 'LABEL TEXT' }
            ];

            let html = '<div style="width: 100%; display: flex; flex-direction: column; gap: 32px;">';
            samples.forEach(s => {
                html += `
                    <div>
                        <div style="font-size:11px; color:#adb5bd; margin-bottom:8px;">${s.label} (.${s.class})</div>
                        <div class="${s.class}">${s.text}</div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // --- Icon Explorer ---
        function renderIconExplorer(container) {
            const icons = Object.keys(window.ICON_MAP || {});
            let html = `
                <div style="width: 100%;">
                    <div style="margin-bottom:20px"><input type="text" placeholder="Search icons..." style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; box-sizing: border-box;"></div>
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 16px; text-align: center;">
            `;
            icons.forEach(name => {
                html += `
                    <div class="icon-card" style="padding:12px; background:#fdfdfd; border-radius:8px; border:1px solid #f0f0f0;">
                        <div id="icon-preview-${name}" style="margin-bottom:8px; display:flex; justify-content:center;"></div>
                        <div style="font-size:10px; color:#555; word-break:break-all;">${name}</div>
                    </div>
                `;
            });
            html += '</div></div>';
            container.innerHTML = html;

            // Render actual icons
            icons.forEach(name => {
                const iconEl = window.renderIcon({ name: name, size: 24 });
                const target = document.getElementById(`icon-preview-${name}`);
                if (target) target.appendChild(iconEl);
            });
        }

        function renderSpacingRadius(container) {
            const spacing = [100, 200, 300, 400, 500, 600, 800];
            const radius = [200, 'full'];

            let html = '<div style="width: 100%; display: grid; gap: 48px;">';

            // Spacing
            html += '<div><h4 style="margin-bottom:16px">Spacing</h4><div style="display:flex; flex-direction:column; gap:12px;">';
            spacing.forEach(s => {
                html += `
                    <div style="display:flex; align-items:center; gap:16px;">
                        <div style="width:100px; font-size:12px; font-weight:600">--spacing-${s}</div>
                        <div style="height:20px; width:var(--spacing-${s}); background:var(--blue-2);"></div>
                        <div style="font-size:11px; color:#666">${s * 4 / 100}px / ${s}</div>
                    </div>
                `;
            });
            html += '</div></div>';

            // Radius
            html += '<div><h4 style="margin-bottom:16px">Radius</h4><div style="display:flex; gap:24px;">';
            radius.forEach(r => {
                const varName = r === 'full' ? '--radius-full' : `--radius-${r}`;
                html += `
                    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
                        <div style="width:80px; height:80px; background:var(--bg-secondary); border:1px solid var(--border-primary); border-radius:var(${varName})"></div>
                        <div style="font-size:11px; font-weight:600">${varName}</div>
                    </div>
                `;
            });
            html += '</div></div>';

            html += '</div>';
            container.innerHTML = html;
        }

        // --- Component Story Builders ---
        function setupChipStory(canvas, controls) {
            const params = {
                label: 'Sample Chip',
                variant: 'hero-category',
                leftIcon: 'ai-weather'
            };

            const update = () => {
                canvas.innerHTML = '';
                const chip = renderChip(params);
                setCanvasContent(canvas, chip);
                updateCode('renderChip', params);
            };

            createControl(controls, 'text', 'Label', (v) => { params.label = v; update(); }, params.label);
            createControl(controls, 'select', 'Variant', (v) => { params.variant = v; update(); }, params.variant,
                ['hero-category', 'suggestion-card', 'solid-rounded-rect', 'solid-rounded', 'outline-gradient']);
            createControl(controls, 'select', 'Icon', (v) => { params.leftIcon = v; update(); }, params.leftIcon,
                [null, ...Object.keys(window.ICON_MAP)]);

            update();
        }

        function setupAvatarStory(canvas, controls) {
            const params = {
                size: 'large',
                type: 'AI'
            };

            const update = () => {
                canvas.innerHTML = '';
                if (window.renderAvatar) {
                    const avatar = renderAvatar(params);
                    setCanvasContent(canvas, avatar);
                    updateCode('renderAvatar', params);
                }
            };

            createControl(controls, 'select', 'Size', (v) => { params.size = v; update(); }, params.size,
                ['small', 'medium', 'large', 'xlarge', 'xxlarge']);
            createControl(controls, 'select', 'Type', (v) => { params.type = v; update(); }, params.type,
                ['user', 'AI']);

            update();
        }

        function setupTopNavStory(canvas, controls) {
            const params = {
                headerTitle: 'Agent i',
                os: 'mobile',
                titleAlign: 'left',
                showLeftIcon: false,
                rightIcons: ['bell', 'menu']
            };

            const update = () => {
                canvas.innerHTML = '';
                canvas.style.width = '100vw';
                canvas.style.maxWidth = '100%';

                if (window.renderAiSuggestionList) {
                    const list = renderAiSuggestionList(params);
                    setCanvasContent(canvas, list);
                    updateCode('renderAiSuggestionList', params);
                }
            };
            createControl(controls, 'text', 'Title', (v) => { params.title = v; update(); }, 'AIに追加の質問');
            update();
        }

        // --- Helpers ---
        function createControl(container, type, label, onChange, defaultValue, options = []) {
            const row = document.createElement('div');
            row.style.marginBottom = '12px';
            row.innerHTML = `<label style="display:block; font-size:12px; margin-bottom:4px; font-weight:600;">${label}</label>`;

            let input;
            if (type === 'select') {
                input = document.createElement('select');
                input.style.width = '100%';
                input.style.padding = '6px';
                options.forEach(opt => {
                    const o = document.createElement('option');
                    o.value = opt === null ? '' : opt;
                    o.textContent = opt === null ? 'None' : opt;
                    if (opt === defaultValue) o.selected = true;
                    input.appendChild(o);
                });
            } else {
                input = document.createElement('input');
                input.type = 'text';
                input.value = defaultValue;
                input.style.width = '100%';
                input.style.padding = '6px';
                input.style.boxSizing = 'border-box';
            }

            input.onchange = (e) => onChange(e.target.value);
            row.appendChild(input);
            container.appendChild(row);
        }

        function updateCode(fnName, params) {
            const json = JSON.stringify(params, null, 2);
            document.getElementById('code-snippet').textContent = `${fnName}(${json});`;
        }

        function toggleDarkMode() {
            document.getElementById('preview-canvas').classList.toggle('dark-mode');
        }

        window.onload = initExplorer;
    </script>
</body>

</html>
