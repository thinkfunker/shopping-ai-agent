    <!-- Explorer Specific Styles -->
    <style>
        :root {
            --sidebar-width: 240px;
            --header-height: 60px;
            --explorer-bg: #ffffff;
            --border-color: #eeeeee;
            --accent-color: #000000;
            --sidebar-bg: #ffffff;
            --bg-secondary: #fafafa;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background: #fff;
            color: #111;
        }

        .explorer-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar - Ultra Minimal */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar-header {
            padding: 32px 24px 24px;
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #000;
        }

        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 32px;
        }

        .menu-section {
            margin-bottom: 32px;
        }

        .menu-title {
            padding: 0 12px 8px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            font-weight: 600;
        }

        .menu-item {
            padding: 8px 12px;
            margin: 1px 0;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            border-radius: 6px;
            transition: all 0.15s ease;
        }

        .menu-item:hover {
            color: #000;
            background: #f5f5f5;
        }

        .menu-item.active {
            color: #000;
            background: #eeeeee;
            font-weight: 600;
        }

        /* Main Content - Ultra Minimal */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            overflow: hidden;
        }

        .top-bar {
            height: var(--header-height);
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 32px;
            justify-content: space-between;
        }

        #active-item-title {
            font-size: 13px;
            font-weight: 600;
            color: #000;
        }

        .top-bar {
            height: var(--header-height);
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 24px;
            justify-content: space-between;
        }

        .preview-area {
            flex: 1;
            padding: 60px;
            overflow-y: auto;
            background: #fff;
            transition: background 0.3s ease;
        }

        .preview-area.mobile-mode {
            background: #fafafa;
        }

        .sandbox {
            background: #fff;
            width: 100%;
            min-height: 80vh;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sandbox.mobile-view {
            max-width: 375px;
            margin: 0 auto;
            border: 1px solid #eee;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.02);
            border-radius: 8px;
            /* Subtle radius for mobile look */
        }

        #preview-canvas {
            flex: 1;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 40px;
            align-items: stretch;
            /* Default for foundations */
        }

        .sandbox.mobile-view #preview-canvas {
            align-items: center;
            /* Center components in mobile view */
        }

        .sandbox.dark-mode {
            background: #1c1c1e;
            border-color: #313131;
        }

        .controls-panel {
            height: 200px;
            /* Reduced from 240px */
            background: #fff;
            border-top: 1px solid var(--border-color);
            display: flex;
        }

        .controls-inner {
            flex: 1;
            padding: 24px 32px;
            /* Reduced vertical padding */
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .code-inner {
            flex: 1;
            padding: 24px 32px;
            background: #fff;
            /* Match background for seamless look */
            overflow-y: auto;
        }

        .controls-panel h3 {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #bbb;
            margin: 0 0 16px 0;
            font-weight: 700;
        }

        /* Minimalist Input Styles */
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            /* Tighter spacing */
            gap: 20px;
        }

        .control-label {
            font-size: 11px;
            color: #666;
            font-weight: 400;
        }

        .control-input,
        .control-select {
            border: none;
            border-bottom: 1px solid #eee;
            background: transparent;
            font-size: 11px;
            padding: 2px 0;
            width: 120px;
            outline: none;
            color: #000;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        .control-input:focus,
        .control-select:focus {
            border-bottom-color: #000;
        }

        #code-snippet {
            font-size: 11px;
            color: #777;
            margin: 0;
            line-height: 1.5;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        /* Color Detail Modal */
        .color-modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .color-modal {
            background: #fff;
            width: 400px;
            padding: 40px;
            animation: modalFadeIn 0.2s ease-out;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .color-preview-large {
            width: 100%;
            height: 80px;
            margin-bottom: 32px;
        }

        .info-label {
            font-size: 9px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 13px;
            color: #111;
            padding: 0 0 12px;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 20px;
        }

        .info-value.variable {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: #000;
            font-weight: 500;
        }
    </style>

    <!-- Explorer Logic -->
    <script>
        // --- Data & Configuration ---
        const menuData = [
            {
                section: 'Foundations',
                items: [
                    { id: 'colors', name: 'Colors' },
                    { id: 'typography', name: 'Typography' },
                    { id: 'spacing-radius', name: 'Spacing & Radius' },
                    { id: 'gradients-effects', name: 'Gradients & Effects' },
                    { id: 'icon-explorer', name: 'Icon Explorer' }
                ]
            },
            {
                section: 'Core UI',
                items: [
                    { id: 'button', name: 'Button' },
                    { id: 'ghost-button', name: 'Ghost Button' },
                    { id: 'avatar', name: 'Avatar' },
                    { id: 'badge', name: 'Badge' },
                    { id: 'chip', name: 'Chip' },
                    { id: 'tag', name: 'Tag' },
                    { id: 'divider', name: 'Divider' }
                ]
            },
            {
                section: 'Selection & Forms',
                items: [
                    { id: 'checkbox', name: 'Checkbox' },
                    { id: 'radio', name: 'Radio Button' },
                    { id: 'switch', name: 'Switch' },
                    { id: 'toggle-btn', name: 'Toggle Button' },
                    { id: 'text-input', name: 'Text Input' },
                    { id: 'ai-input', name: 'AI Text Input' }
                ]
            },
            {
                section: 'Navigation',
                items: [
                    { id: 'top-nav', name: 'Top Navigation' },
                    { id: 'tabs', name: 'Tabs' },
                    { id: 'pagination', name: 'Pagination' },
                    { id: 'page-indicator', name: 'Page Indicator' },
                    { id: 'menu', name: 'Menu' },
                    { id: 'footer', name: 'Footer' }
                ]
            },
            {
                section: 'Feedback & Overlays',
                items: [
                    { id: 'modal', name: 'Modal' },
                    { id: 'scrim', name: 'Scrim' },
                    { id: 'toast', name: 'Toast' },
                    { id: 'tooltip', name: 'Tooltip' },
                    { id: 'progress', name: 'Progress Indicator' }
                ]
            },
            {
                section: 'Complex UI',
                items: [
                    { id: 'accordion', name: 'Accordion' },
                    { id: 'list-item', name: 'List Item' },
                    { id: 'carousel', name: 'Carousel' },
                    { id: 'card-expand', name: 'Card Expand' },
                    { id: 'score', name: 'Score' },
                    { id: 'thumbnail', name: 'Thumbnail' },
                    { id: 'image-preview', name: 'Image Preview' },
                    { id: 'ai-bg', name: 'AI Background' }
                ]
            },
            {
                section: 'AI Templates',
                items: [
                    { id: 'message', name: 'Message' },
                    { id: 'message-action-bar', name: 'Message Action Bar' },
                    { id: 'message-list', name: 'Message List' },
                    { id: 'ai-suggestion', name: 'AI Suggestion List' },
                    { id: 'ai-suggestion-chips', name: 'AI Suggestion Chips' },
                    { id: 'base-card', name: 'Base Card' },
                    { id: 'media-card', name: 'Media Card' },
                    { id: 'list-card', name: 'List Card' },
                    { id: 'review-card', name: 'Review Card' },
                    { id: 'interaction-card', name: 'Interaction Card' },
                    { id: 'bottom-button', name: 'Bottom Button Bar' },
                    { id: 'bottom-sheet', name: 'Bottom Sheet' }
                ]
            }
        ];

        // --- App State ---
        let currentItem = null;
        let metadata = { colors: {}, icons: {} };

        async function loadMetadata() {
            try {
                const response = await fetch('./design-system/metadata.json');
                if (response.ok) {
                    metadata = await response.json();
                }
            } catch (e) {
                console.warn('Metadata not found or load failed');
            }
        }

        async function initExplorer() {
            await loadMetadata();
            const menuContainer = document.getElementById('sidebar-menu');
            menuData.forEach(section => {
                const sectionEl = document.createElement('div');
                sectionEl.className = 'menu-section';
                sectionEl.innerHTML = `<div class="menu-title">${section.section}</div>`;

                section.items.forEach(item => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'menu-item';
                    itemEl.textContent = item.name;
                    itemEl.onclick = (e) => loadItem(item, e.currentTarget);
                    sectionEl.appendChild(itemEl);
                });
                menuContainer.appendChild(sectionEl);
            });

            // Load default item
            const firstItem = document.querySelector('.menu-item');
            if (firstItem) firstItem.click();
        }

        function loadItem(item, targetEl) {
            currentItem = item;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            targetEl.classList.add('active');
            document.getElementById('active-item-title').textContent = item.name;

            const canvas = document.getElementById('preview-canvas');
            const sandbox = document.getElementById('preview-sandbox');
            const previewArea = document.querySelector('.preview-area');
            const controls = document.getElementById('controls-list');

            canvas.innerHTML = '';
            controls.innerHTML = '';
            document.getElementById('code-snippet').textContent = '';

            // Handle Mobile View for non-foundations
            const foundations = ['colors', 'typography', 'spacing-radius', 'gradients-effects', 'icon-explorer'];
            if (!foundations.includes(item.id)) {
                sandbox.classList.add('mobile-view');
                previewArea.classList.add('mobile-mode');
            } else {
                sandbox.classList.remove('mobile-view');
                previewArea.classList.remove('mobile-mode');
            }

            switch (item.id) {
                case 'colors': renderColors(canvas); break;
                case 'typography': renderTypography(canvas); break;
                case 'icon-explorer': renderIconExplorer(canvas); break;
                case 'spacing-radius': renderSpacingRadius(canvas); break;
                case 'gradients-effects': renderGradientsEffects(canvas); break;
                case 'chip': setupChipStory(canvas, controls); break;
                case 'avatar': setupAvatarStory(canvas, controls); break;
                case 'button': setupButtonStory(canvas, controls); break;
                case 'badge': setupBadgeStory(canvas, controls); break;
                case 'accordion': setupAccordionStory(canvas, controls); break;
                case 'checkbox': setupCheckboxStory(canvas, controls); break;
                case 'radio': setupRadioButtonStory(canvas, controls); break;
                case 'switch': setupSwitchStory(canvas, controls); break;
                case 'text-input': setupTextInputStory(canvas, controls); break;
                case 'tag': setupTagStory(canvas, controls); break;
                case 'ghost-button': setupGhostButtonStory(canvas, controls); break;
                case 'divider': setupDividerStory(canvas, controls); break;
                case 'modal': setupModalStory(canvas, controls); break;
                case 'tabs': setupTabsStory(canvas, controls); break;
                case 'list-item': setupListItemStory(canvas, controls); break;
                case 'carousel': setupCarouselStory(canvas, controls); break;
                case 'tooltip': setupTooltipStory(canvas, controls); break;
                case 'toast': setupToastStory(canvas, controls); break;
                case 'thumbnail': setupThumbnailStory(canvas, controls); break;
                case 'progress': setupProgressStory(canvas, controls); break;
                case 'top-nav': setupTopNavStory(canvas, controls); break;
                case 'ai-input': setupAIInputStory(canvas, controls); break;
                case 'ai-bg': setupAIBgStory(canvas, controls); break;
                case 'card-expand': setupCardExpandStory(canvas, controls); break;
                case 'carousel': setupCarouselStory(canvas, controls); break;
                case 'footer': setupFooterStory(canvas, controls); break;
                case 'pagination': setupPaginationStory(canvas, controls); break;
                case 'score': setupScoreStory(canvas, controls); break;
                case 'scrim': setupScrimStory(canvas, controls); break;
                case 'toggle-btn': setupToggleBtnStory(canvas, controls); break;
                case 'page-indicator': setupPageIndicatorStory(canvas, controls); break;
                case 'image-preview': setupImagePreviewStory(canvas, controls); break;
                case 'menu': setupMenuStory(canvas, controls); break;
                case 'message': setupMessageStory(canvas, controls); break;
                case 'message-action-bar': setupMessageActionBarStory(canvas, controls); break;
                case 'message-list': setupMessageListStory(canvas, controls); break;
                case 'ai-suggestion': setupAiSuggestionListStory(canvas, controls); break;
                case 'ai-suggestion-chips': setupAISuggestionChipsStory(canvas, controls); break;
                case 'base-card': setupBaseCardStory(canvas, controls); break;
                case 'media-card': setupMediaCardStory(canvas, controls); break;
                case 'bottom-button': setupBottomButtonStory(canvas, controls); break;
                case 'bottom-sheet': setupBottomSheetStory(canvas, controls); break;
            }
        }

        // --- Color Detail Logic ---
        const tokenMapping = {
            '--bg-primary': '--gray-14 (inverted) or white',
            '--bg-secondary': '--gray-1',
            '--bg-tertiary': '--gray-3',
            '--bg-key': '--blue-8',
            '--bg-success': '--green-7',
            '--bg-alert': '--red-8',
            '--bg-warning': '--yellow-7',
            '--content-primary': '--gray-12',
            '--content-secondary': '--gray-8',
            '--content-tertiary': '--gray-6',
            '--content-key': '--blue-8',

            const primitiveLabel = document.getElementById('modal-primitive-token');
            const hexValue = document.getElementById('modal-hex-value');
            const descValue = document.getElementById('modal-description');

            const style = getComputedStyle(document.documentElement);
            const value = style.getPropertyValue(varName).trim();
            const meta = metadata.colors[varName] || {};

            preview.style.background = `var(${varName})`;
            semanticLabel.textContent = varName;
            primitiveLabel.textContent = tokenMapping[varName] || 'Direct Value';
            hexValue.textContent = value || 'Calculating...';
            descValue.textContent = meta.description || 'No description available for this token.';

            backdrop.style.display = 'flex';
        }

        function hideColorModal() {

        // --- Icon Explorer ---
        function renderIconExplorer(container) {
            const iconMap = window.ICON_MAP || {};
            const categories = {};

            // Group icons by category
            Object.entries(iconMap).forEach(([key, config]) => {
                const cat = config.category || 'other';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(key);
            });

            const catLabels = {
                'ai': 'AI Icons (Gradient & Solid)',
                'common': 'Common UI Icons (Outline & Solid)',
                'map': 'Map Pins & Location Icons',
                'service': 'Service & Product Icons'
            };

                    </div>
                    <div id="icon-grid-container" style="display: flex; flex-direction: column; gap: 40px;">
            `;

                    html += `
                        <div class="icon-section-group" id="section-${catId}">

                    `;

                    categories[catId].sort().forEach(name => {

                        html += `
                            <div class="icon-card" data-name="${name}" style="padding:16px; background:var(--bg-primary); border-radius:12px; border:1px solid var(--border-secondary); text-align: center; transition: all 0.2s;" title="${iconDesc}">

                            </div>
                        `;
                    });

                    html += '</div></div>';

            });

            html += '</div></div>';

            // Render actual icons

                });

                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('.icon-card').forEach(card => {

                        card.style.display = name.includes(term) ? 'block' : 'none';

                        const hasVisible = group.querySelectorAll('.icon-card:not([style*="display: none"])').length > 0;

                    setCanvasContent(canvas, el);
                    updateCode('renderListCard', params);
                }
            };

            update();
        }

        function setupReviewCardStory(canvas, controls) {
            const params = {
                user: { name: 'Alex Johnson', avatar: 'https://i.pravatar.cc/150?u=alex' },
                rating: 5,
                date: '2024.03.12',
                content: 'This product exceeded my expectations! The quality is top-notch and it arrived earlier than expected.',
                images: ['https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=200&q=80']
            };

            const update = () => {
                canvas.innerHTML = '';
                if (window.renderReviewCard) {
                    const el = renderReviewCard(params);
                    setCanvasContent(canvas, el);
                    updateCode('renderReviewCard', params);
                }
            };

            update();
        }

        function setupInteractionCardStory(canvas, controls) {
            const params = {
                type: 'question',
                question: 'What kind of coffee do you prefer?',
                choices: [{ label: 'Espresso', selected: true }, { label: 'Latte', selected: false }, { label: 'Americano', selected: false }],
                interactionType: 'carousel'
            };

            const update = () => {
                canvas.innerHTML = '';
                let el;
                if (params.type === 'question') {
                    if (window.renderQuestionCard) el = renderQuestionCard({ question: params.question, choices: params.choices });
                } else if (params.type === 'selection') {
                    if (window.renderSelectionCard) el = renderSelectionCard({
                        title: 'Premium Espresso',
                        subtitle: 'Rich and intense',
                        image: 'https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?auto=format&fit=crop&w=200&q=80',
                        selected: true,
                        tags: ['Organic', 'Medium Roast']
                    });
                } else if (params.type === 'choice-result') {
                    if (window.renderChoiceResultCard) el = renderChoiceResultCard({
                        display: 'both',
                        questions: [{
                            text: 'Temperature?',
                            choices: [{ label: 'Hot', selected: true }, { label: 'Iced', selected: false }]
                        }],
                        result: {
                            count: 12,
                            items: [
                                { title: 'Product A', brand: 'Brand X', image: 'https://picsum.photos/200/201' },
                                { title: 'Product B', brand: 'Brand Y', image: 'https://picsum.photos/200/202' }
                            ],
                            type: params.interactionType,
                            mediaSize: 'medium'
                        }
                    });
                }
                if (el) setCanvasContent(canvas, el);
                updateCode('renderInteractionCard', params);
            };

            createControl(controls, 'select', 'Card Type', (v) => { params.type = v; update(); }, params.type, ['question', 'selection', 'choice-result']);
            createControl(controls, 'select', 'Result Layout', (v) => { params.interactionType = v; update(); }, params.interactionType, ['carousel', 'list']);

            update();
        }

        function setupBottomButtonStory(canvas, controls) {
            const params = {
                layout: 'single',
                buttons: [{ label: 'Primary Action', type: 'primary' }]
            };

            const update = () => {
                canvas.innerHTML = '';
                if (window.renderBottomButton) {
                    const el = renderBottomButton(params);
                    setCanvasContent(canvas, el);
                    updateCode('renderBottomButton', params);
                }
            };

            createControl(controls, 'select', 'Layout', (v) => { params.layout = v; update(); }, params.layout, ['single', 'horizontal', 'vertical']);
            update();
        }

        function setupBottomSheetStory(canvas, controls) {
            const params = {
                title: 'Bottom Sheet Header',
                showHandle: true
            };

            const update = () => {
                canvas.innerHTML = '';
                if (window.renderBottomSheet) {
                    const el = renderBottomSheet(params);
                    setCanvasContent(canvas, el);
                    updateCode('renderBottomSheet', params);
                }
            };

            update();
        }

        // --- Helpers ---
        function createControl(container, type, label, onChange, defaultValue, options = []) {
            const row = document.createElement('div');
            row.className = 'control-row';
            row.innerHTML = `<label class="control-label">${label}</label>`;

            let input;
            if (type === 'select') {
                input = document.createElement('select');
                input.className = 'control-select';
                options.forEach(opt => {
                    const o = document.createElement('option');
                    o.value = opt === null ? '' : opt;
                    o.textContent = opt === null ? 'None' : opt;
                    if (opt === defaultValue) o.selected = true;
                    input.appendChild(o);
                });
            } else {
                input = document.createElement('input');
                input.type = 'text';
                input.value = defaultValue;
                input.className = 'control-input';
                input.style.boxSizing = 'border-box';
            }

            input.onchange = (e) => onChange(e.target.value);
            row.appendChild(input);
            container.appendChild(row);
        }

        function updateCode(fnName, params) {
            const json = JSON.stringify(params, null, 2);
            document.getElementById('code-snippet').textContent = `${fnName}(${json});`;
        }

        function toggleDarkMode() {
            const sandbox = document.getElementById('preview-sandbox');
            sandbox.classList.toggle('dark-mode');
        }

        window.onload = initExplorer;
    </script>
</body>
