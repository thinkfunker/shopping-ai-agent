        function initApp() {

        function renderQuestion() {
            if (currentStep >= questions.length) {
                showResult();
                return;
            }

            const q = questions[currentStep];

            // Update Headers
            document.getElementById('step-indicator').innerText = `${currentStep + 1}/${questions.length}`;
            document.getElementById('topic-indicator').innerText = q.topic;

            const progressPercentage = ((currentStep + 1) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercentage}%`;

            // Hide back button on first step
            document.getElementById('back-button').style.visibility = currentStep === 0 ? 'hidden' : 'visible';

            const main = document.getElementById('main-content');
            main.className = 'main-content scroll-hide fade-in';

            main.innerHTML = `
                <div class="title-section">
                    <div class="ai-icon-container">
                        <video autoPlay loop muted playsInline class="ai-video-icon">
                            <source src="images/ai_icon.mp4" type="video/mp4" />
                        </video>
                    </div>
                    <h1>${q.title}</h1>
                    <p>${q.subtitle}</p>
                </div>
                <div class="ab-test-container">
                    <div class="ab-card top-card" onclick="selectOption('${q.options[0].id}', this)">
                        <img src="${q.options[0].img}" alt="Option A" class="card-bg">
                        <div class="card-gradient-top"></div>
                        <h3 class="card-title title-top">${q.options[0].title}</h3>
                    </div>
                    
                    <div class="vs-badge">VS</div>
                    
                    <div class="ab-card bottom-card" onclick="selectOption('${q.options[1].id}', this)">
                        <img src="${q.options[1].img}" alt="Option B" class="card-bg">
                        <div class="card-gradient-bottom"></div>
                        <h3 class="card-title title-bottom">${q.options[1].title}</h3>
                    </div>
                </div>
            `;
        }

        function selectOption(id, element) {
            // Check if already animating to prevent double clicks
            if (document.querySelector('.ab-card.selected')) return;

            const cards = document.querySelectorAll('.ab-card');
            cards.forEach(card => {
                if (card !== element) {
                    card.style.opacity = '0.3';
                }
            });
            element.classList.add('selected');

            // Store selection
            selectedOptions[currentStep] = id;

            setTimeout(() => {
                currentStep++;
                renderQuestion();
            }, 600);
        }

        function goBack() {
            if (currentStep > 0) {
                currentStep--;
                renderQuestion();
            }
        }

        function showAnalyzing() {
            document.getElementById('step-indicator').innerText = "";
            document.getElementById('topic-indicator').innerText = "結果分析中";
            document.getElementById('back-button').style.visibility = 'hidden';
            // Start glowing animation for progress
            document.getElementById('progress-bar').classList.add('analyzing-pulse');
            document.getElementById('progress-bar').style.width = '100%';

            const main = document.getElementById('main-content');
            main.className = 'main-content scroll-hide analyzing-screen';
            main.innerHTML = `
                <div class="spinner-container">
                    <div class="spinner"></div>
                </div>
                <h2>あなたのショッピングスタイルを<br>AIが分析しています。</h2>

                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            `;

            // Wait 2.5 seconds to simulate analyzing
            setTimeout(() => {
                document.getElementById('progress-bar').classList.remove('analyzing-pulse');
                showResult();
            }, 2500);
